<link rel="preconnect" href="https://fonts.googleapis.com" />

<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          display: ['Cinzel', 'Georgia', 'serif'],
        },
        colors: {
          ink: { 950:'#050608', 900:'#0a0c10', 850:'#0f1218', 800:'#151922', 700:'#1c2230', 600:'#2a3142', 500:'#3a4356' },
          paper: { 50:'#fafbfc', 100:'#f3f5f8', 200:'#e6eaf0', 300:'#d2d8e0', 400:'#9ca3af', 500:'#6b7280', 600:'#4b5563', 700:'#374151', 800:'#1f2937' },
          gold: { 50:'#fbf7ec', 100:'#f5ecd0', 200:'#ead49b', 300:'#dcb963', 400:'#cfa441', 500:'#c8a96a', 600:'#a78649', 700:'#85693a', 800:'#5e4a29' },
          accent: { 500:'#c8a96a', 600:'#b89758' },
        },
        boxShadow: {
          'gold': '0 0 0 1px rgba(200,169,106,.2), 0 8px 24px -8px rgba(200,169,106,.35)',
          'card': '0 1px 2px rgba(15, 18, 24, 0.04), 0 4px 12px -4px rgba(15, 18, 24, 0.08)',
          'card-hover': '0 4px 8px rgba(15, 18, 24, 0.06), 0 12px 24px -8px rgba(15, 18, 24, 0.12)',
        },
        animation: {
          'fade-in': 'fadeIn .3s ease-out',
          'slide-up': 'slideUp .3s ease-out',
        },
        keyframes: {
          fadeIn: { '0%':{opacity:0}, '100%':{opacity:1} },
          slideUp: { '0%':{opacity:0, transform:'translateY(8px)'}, '100%':{opacity:1, transform:'translateY(0)'} },
        }
      }
    }
  }
</script>

<style>
  :root {
    /* Clean light theme — neutral cool grays, no more beige */
    --bg-base: #f5f7fa;
    --bg-elev: #ffffff;
    --bg-elev2: #fafbfc;
    --border: #e6eaf0;
    --border-strong: #d2d8e0;
    --gold: #c8a96a;
    --gold-deep: #85693a;
    --gold-soft: rgba(200,169,106,.10);
    --text-strong: #111827;
    --text: #1f2937;
    --text-soft: #4b5563;
    --text-mute: #9ca3af;
    /* Sidebar dark */
    --sidebar-bg: #0a0c10;
    --sidebar-elev: #151922;
    --sidebar-border: rgba(255,255,255,.06);
    --sidebar-text: #aab2c0;
    --sidebar-text-strong: #f3f4f6;
  }
  html, body, #root { height: 100%; }
  body {
    background: var(--bg-base);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d2d8e0; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; background-clip: padding-box; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: #2a3142; }
  .sidebar-scroll::-webkit-scrollbar-thumb:hover { background: #3a4356; }

  .gold-grad { background: linear-gradient(135deg, #dcb963 0%, #c8a96a 50%, #85693a 100%); }
  .gold-text { color: #85693a; font-weight: 600; }
  .ring-focus { transition: box-shadow .15s ease, border-color .15s ease; }

  /* Buttons */
  .btn-primary {
    background: linear-gradient(180deg, #d4b378, #c8a96a 60%, #a78649);
    color: #fff;
    font-weight: 600;
    border: 1px solid rgba(133,105,58,.6);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 2px 8px -2px rgba(167, 134, 73, 0.35);
    transition: transform .12s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn-primary:hover { filter: brightness(1.03); box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 4px 14px -2px rgba(167, 134, 73, 0.5); }
  .btn-primary:active { transform: translateY(1px) scale(.99); }
  .btn-ghost { color: #2a2f3a; background: #ffffff; border:1px solid var(--border); transition: all .15s ease; }
  .btn-ghost:hover { background: #fbfaf6; border-color: var(--border-strong); }
  .btn-danger { background: rgba(220, 38, 38, .07); color:#b91c1c; border:1px solid rgba(220,38,38,.25); }
  .btn-danger:hover { background: rgba(220, 38, 38, .12); border-color: rgba(220,38,38,.4); }

  /* Inputs */
  .input-base {
    background: #ffffff;
    border: 1px solid var(--border);
    color: var(--text-strong);
    border-radius: 10px;
    padding: 10px 14px;
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    width: 100%;
    font-size: 14px;
  }
  .input-base:hover { border-color: var(--border-strong); }
  .input-base:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,169,106,.18); }
  .input-base::placeholder { color: #b9b3a0; }
  .label-base { font-size: 11px; color: var(--text-soft); font-weight: 600; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 6px; display: block; }

  /* Cards */
  .card-base { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 1px 2px rgba(15, 18, 24, 0.03); }
  .card-soft { background: var(--bg-elev2); border: 1px solid var(--border); border-radius: 14px; }
  .card-hover { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; cursor: pointer; }
  .card-hover:hover { border-color: rgba(200,169,106,.45); box-shadow: 0 4px 12px -4px rgba(15, 18, 24, 0.10); transform: translateY(-1px); }

  /* Sidebar (dark) */
  .sidebar { background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); color: var(--sidebar-text-strong); }
  .nav-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px; color:var(--sidebar-text); font-weight:500; font-size:14px; transition: background-color .12s ease, color .12s ease, border-color .12s ease; cursor: pointer; user-select:none; border: 1px solid transparent; }
  .nav-item:hover:not(.active) { background: rgba(255,255,255,.04); color:#d6dbe5; }
  .nav-item.active { background: linear-gradient(180deg, rgba(200,169,106,.18), rgba(200,169,106,.08)); color: #f0e3c2; border-color: rgba(200,169,106,.3); }
  .nav-item.active .nav-icon { color: var(--gold); }
  .nav-icon { width:18px; height:18px; flex: none; }

  /* Top bar (light) */
  .topbar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }

  /* Badges */
  .badge { display:inline-flex; align-items:center; gap:4px; padding: 2px 9px; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:.02em; }
  .badge-gold { background: rgba(200,169,106,.13); color:#85693a; border:1px solid rgba(200,169,106,.4); }
  .badge-blue { background: rgba(37,99,235,.08); color:#1d4ed8; border:1px solid rgba(37,99,235,.25); }
  .badge-green { background: rgba(22,163,74,.08); color:#166534; border:1px solid rgba(22,163,74,.25); }
  .badge-red { background: rgba(220,38,38,.08); color:#b91c1c; border:1px solid rgba(220,38,38,.25); }
  .badge-amber { background: rgba(217,119,6,.08); color:#a16207; border:1px solid rgba(217,119,6,.25); }
  .badge-slate { background: rgba(100,116,139,.08); color:#475569; border:1px solid rgba(100,116,139,.2); }

  .table-row { transition: background .12s ease; }
  .table-row:hover { background: rgba(200,169,106,.04); }
  .table-row.clickable { cursor: pointer; }

  .divider { height:1px; background: var(--border); }
  .divider-soft { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,18,24,.45); backdrop-filter: blur(4px); z-index: 80; }
  .modal-shell { position: fixed; inset: 0; z-index: 90; display:flex; align-items:flex-start; justify-content:center; padding: 6vh 16px 16px; pointer-events:none; }
  .modal-card { pointer-events:auto; background: #ffffff; }

  .toast { animation: slideUp .25s ease-out; }

  /* Devis printable (déjà light) */
  .devis-print { background: #fff; color: #0a0c10; font-family: 'Inter', sans-serif; }
  .devis-print h1, .devis-print h2, .devis-print h3 { color: #0a0c10; }

  /* Kanban */
  .kanban-col { min-width: 290px; }
  .kanban-card { cursor: grab; }
  .kanban-card:active { cursor: grabbing; }
  .kanban-drop { transition: all .15s; }
  .kanban-drop.over { background: rgba(200,169,106,.06); border-color: rgba(200,169,106,.45); }

  /* Progress */
  .progress-track { background: rgba(15, 18, 24, .06); border-radius:999px; height:6px; overflow:hidden; }
  .progress-bar { height:100%; background: linear-gradient(90deg, #c8a96a, #dcb963); transition: width .4s ease; }

  /* Hero clean */
  .hero-shimmer-light {
    background: linear-gradient(135deg, #ffffff 0%, #f3f5f8 100%);
    border: 1px solid var(--border);
  }
  @keyframes shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

  /* KPI accent strip */
  .kpi-accent { position: relative; overflow: hidden; }
  .kpi-accent::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); }

  @media (max-width: 768px) {
    .sidebar-mobile-hide { display:none; }
  }
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: absolute; left: 0; top: 0; width: 100%; }
    .no-print { display: none !important; }
  }
</style>
